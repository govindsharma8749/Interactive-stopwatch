<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stylish Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Stopwatch</h1>
  <div id="display">00<span class="blink">:</span>00<span class="blink">:</span>00</div>
  <div class="buttons">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <button id="lap">Lap</button>
  </div>
  <div id="laps">
    <h2>Lap Times</h2>
    <ul id="lapList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
